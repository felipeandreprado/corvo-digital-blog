{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blog{% endblock %}</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'css/mobile.css' %}">
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="site-header">
    <div class="header-shell">

        <!-- MENU -->
        <button class="icon-button menu-toggle" type="button" aria-label="Abrir menu">
            <span class="menu-toggle__line"></span>
            <span class="menu-toggle__line"></span>
            <span class="menu-toggle__line"></span>
        </button>

        <!-- LOGO -->
        <a class="site-logo" href="{% url 'blog:home' %}">
            <img src="{% static 'img/logo_corvo.png' %}" class="logo-img" alt="Corvo Digital">
            <span class="logo-text">Corvo<span class="destaque">Digital</span></span>
        </a>

        <!-- BUSCA -->
        <a class="icon-button search-link" href="{% url 'blog:search' %}" aria-label="Buscar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
            </svg>
        </a>

    </div>
</header>

<!-- BACKDROP -->
<div class="menu-backdrop"></div>

<!-- ================= MENU LATERAL ================= -->
<aside class="side-menu" aria-hidden="true">

    <!-- CATEGORIAS -->
    <div class="menu-grid">

        <a href="{% url 'blog:category-detail' 'ciberseguranca' %}" class="menu-card-img">
            <img src="{% static 'img/ciberseguranca.png' %}" alt="Cibersegurança">
        </a>

        <a href="{% url 'blog:category-detail' 'dados' %}" class="menu-card-img">
            <img src="{% static 'img/dados.png' %}" alt="Dados">
        </a>

        <a href="{% url 'blog:category-detail' 'desenvolvimento' %}" class="menu-card-img">
            <img src="{% static 'img/desenvolvimento.png' %}" alt="Desenvolvimento">
        </a>

        <a href="{% url 'blog:category-detail' 'nuvem' %}" class="menu-card-img">
            <img src="{% static 'img/nuvem.png' %}" alt="Nuvem">
        </a>

        <a href="{% url 'blog:category-detail' 'redes' %}" class="menu-card-img">
            <img src="{% static 'img/redes.png' %}" alt="Redes">
        </a>

    </div>

    <!-- SOCIAL -->
    <div class="menu-social">
        <div class="social-row">

            <!-- Instagram -->
            <a href="https://www.instagram.com/felipeprado.tech/" class="social-btn instagram" target="_blank">
                Instagram
            </a>

            <!-- Pinterest -->
            <a href="#" class="social-btn">
                Pinterest
            </a>

            <!-- YouTube -->
            <a href="#" class="social-btn">
                YouTube
            </a>

        </div>
    </div>

</aside>

<!-- ================= CONTEÚDO ================= -->
<main class="page-shell">
    {% block content %}{% endblock %}
</main>

<!-- JS -->
<script src="{% static 'js/app.js' %}"></script>

</body>
</html>
